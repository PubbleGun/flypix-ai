name: Deploy FlyPix AI to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout approved public version
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build approved public version
        run: |
          npm ci
          npm run build
          npm run preview:file

      - name: Prepare approved public site
        run: |
          mkdir -p _site/public
          cp github-pages/index.html _site/index.html
          cp -R public/. _site/public/
          touch _site/.nojekyll

      - name: Checkout working preview version
        uses: actions/checkout@v6
        with:
          ref: review/current
          path: review-source

      - name: Build working preview version
        working-directory: review-source
        run: |
          npm ci
          npm run build
          npm run preview:file

      - name: Add working preview to public artifact
        run: |
          mkdir -p _site/previews/review-current/public
          cp review-source/github-pages/index.html _site/previews/review-current/index.html
          cp -R review-source/public/. _site/previews/review-current/public/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
